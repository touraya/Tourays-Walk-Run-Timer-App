<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tourays Fitness V6.1 Part 1</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#eef7ff,#d8fff2);color:#17324d}
header{padding:24px;text-align:center;background:linear-gradient(90deg,#00b894,#4facfe);color:#fff}
.card{margin:18px;padding:18px;border-radius:22px;background:rgba(255,255,255,.8);box-shadow:0 10px 30px rgba(0,0,0,.12)}
button{width:100%;padding:16px;border:none;border-radius:16px;background:#00b894;color:#fff;font-size:18px}
#timer{font-size:54px;text-align:center;font-weight:bold}
.small{color:#666}
</style>
</head>
<body>
<header><h1>Tourays Fitness</h1><p>Premium V6.1 • Part 1</p></header>
<div class="card">
<h2>Run</h2>
<div id="timer">00:00</div>
<button id="start">Start Workout</button>
<p class="small">Walk/Run timer foundation. More features arrive in Part 2.</p>
</div>
<div class="card">
<h2>Health</h2>
<p>Calories: 0</p>
<p>Distance: 0.00 km</p>
<p>Weekly Goal: 0%</p>
</div>
<script>
let s=0,r=null;
start.onclick=()=>{
 if(r)return;
 r=setInterval(()=>{
  s++;
  let m=String(Math.floor(s/60)).padStart(2,'0');
  let ss=String(s%60).padStart(2,'0');
  timer.textContent=m+":"+ss;
 },1000);
};
</script>
</body></html>
