<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tourays Fitness V6.1 Part 4</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#f8fdff,#e9fff5)}
header{background:linear-gradient(90deg,#00c896,#4facfe);padding:20px;color:#fff;text-align:center}
.wrap{padding:18px}
.card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.12);margin-bottom:18px}
label{display:block;margin:10px 0 6px}
input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc}
button{margin-top:16px;width:100%;padding:14px;border:none;border-radius:16px;background:#00c896;color:#fff;font-size:17px}
</style></head>
<body>
<header><h1>Settings</h1><p>Premium V6.1 • Part 4</p></header>
<div class="wrap">
<div class="card">
<h2>Profile</h2>
<label>Weight (kg)</label><input type="number" placeholder="75">
<label>Height (cm)</label><input type="number" placeholder="180">
<label>Voice</label>
<select><option>English</option><option>German</option></select>
<button>Save Settings</button>
</div>
<div class="card">
<h2>Backup</h2>
<p>Backup/restore placeholder for future release.</p>
</div>
<div class="card">
<h2>Version</h2>
<p>Tourays Fitness V6.1 – Part 4</p>
</div>
</div>
</body></html>
